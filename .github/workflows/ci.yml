name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  VALE_VERSION: '3.14.2'

jobs:
  lint-prose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install en_AU Hunspell dictionary
        run: sudo apt-get install -y hunspell-en-au

      - name: Install Vale
        run: |
          curl -sL "https://github.com/vale-cli/vale/releases/download/v${{ env.VALE_VERSION }}/vale_${{ env.VALE_VERSION }}_Linux_64-bit.tar.gz" \
            | tar -xz -C /usr/local/bin vale

      - name: Check
        run: make check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for PDF export
        run: npx puppeteer browsers install chrome

      - name: Build
        run: make build
