name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'brief-slides/**/*.md'
      - 'src/content/docs/**/*.mdx'
      - '.vale.ini'
      - '.vale/**'
  pull_request:
    paths:
      - 'brief-slides/**/*.md'
      - 'src/content/docs/**/*.mdx'
      - '.vale.ini'
      - '.vale/**'

env:
  VALE_VERSION: '3.14.2'

jobs:
  lint-prose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install en_AU Hunspell dictionary
        run: sudo apt-get install -y hunspell-en-au

      - name: Install Vale
        run: |
          curl -sL "https://github.com/vale-cli/vale/releases/download/v${{ env.VALE_VERSION }}/vale_${{ env.VALE_VERSION }}_Linux_64-bit.tar.gz" \
            | tar -xz -C /usr/local/bin vale

      - name: Lint prose
        run: vale brief-slides/ src/content/docs/
