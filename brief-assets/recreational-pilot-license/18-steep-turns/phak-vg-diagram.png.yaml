notes: "Typical Vg diagram (flight envelope) from PHAK Chapter 5 (Aerodynamics of Flight). Load factor versus indicated airspeed (mph). Shows the accelerated-stall / maximum-lift boundary, positive and negative structural limit load factors (~+4.5 / -1.8 g for this normal-category example), maneuvering speed, never-exceed speed, and the normal-operating / caution / structural-damage regions. Cropped from page 5-38 at 300 dpi (figure box only, caption removed)."
